name: tes

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分钟触发一次
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Random delay before ping
        run: |
          # 生成随机秒数 0~1800 (30分钟)
          RANDOM_DELAY=$((RANDOM % 1800))
          echo "随机 $RANDOM_DELAY 秒..."
          sleep $RANDOM_DELAY

      - name: tes
        run: |
          echo "访问 ChainIDE 应用..."
          curl -s https://你的-chainide-app-url
          echo "success"
